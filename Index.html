<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Commissioning Pro | Project Sign-Off</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --surface3: #22222f;
            --border: #2a2a3a;
            --accent: #4ecdc4; /* Commissioning Teal */
            --accent2: #ff6b35; /* Alert Orange */
            --accent3: #ffe66d;
            --text: #e8e8f0;
            --text2: #8888aa;
            --text3: #555570;
            --danger: #ff3b5c;
            --success: #00d68f;
            --info: #4361ee;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 40px;
            background-image: 
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(78,205,196,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(255,107,53,0.06) 0%, transparent 60%);
        }

        /* ── HEADER ── */
        .app-header {
            position: sticky; top: 0; z-index: 200;
            background: rgba(10,10,15,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            height: 60px;
        }
        .app-header .logo {
            font-family: var(--font-display);
            font-size: 20px; font-weight: 800;
            letter-spacing: -0.5px;
            display: flex; align-items: center; gap: 10px;
        }
        .app-header .logo .icon {
            width: 32px; height: 32px;
            background: var(--accent);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #000;
        }
        .app-header .logo span { color: var(--accent); }
        .badge-count {
            background: var(--accent);
            color: #000;
            font-size: 11px; font-weight: 700;
            padding: 3px 8px; border-radius: 20px;
            font-family: var(--font-display);
        }

        /* ── SECTION ── */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin: 12px;
            overflow: hidden;
        }
        .section-header {
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }
        .section-header h2 {
            font-family: var(--font-display);
            font-size: 13px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text2);
            display: flex; align-items: center; gap: 8px;
        }
        .section-header h2 .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent);
        }
        .section-header .chevron {
            color: var(--text3); font-size: 12px;
            transition: transform 0.2s;
        }
        .section-header.open .chevron { transform: rotate(180deg); }
        .section-body { padding: 18px; }
        .section-body.collapsed { display: none; }

        /* ── FORM ELEMENTS ── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-grid .full { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label.field-label {
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text3);
        }
        input, textarea, select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            padding: 10px 12px;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--surface3);
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 7px;
            padding: 11px 18px;
            font-family: var(--font-display);
            font-size: 13px; font-weight: 700;
            border: none; border-radius: var(--radius-sm);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
        .btn-success { background: var(--success); color: #000; }
        .btn-full { width: 100%; }

        /* ── TABLE ── */
        .table-wrap { overflow-x: auto; margin-top: 12px; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 12px; }
        thead th {
            background: var(--surface3);
            color: var(--accent);
            text-align: left; padding: 12px;
            text-transform: uppercase; font-size: 10px;
        }
        tbody td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text2); }

        /* ── SIGNATURE ── */
        #sig-canvas {
            background: #fff;
            border-radius: var(--radius-sm);
            width: 100%; height: 150px;
            touch-action: none;
            cursor: crosshair;
        }

        .status-badge {
            padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700;
        }
        .status-pass { background: rgba(0,214,143,0.2); color: var(--success); }
        .status-fail { background: rgba(255,59,92,0.2); color: var(--danger); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo">
        <div class="icon">✓</div>
        Comm<span>Sign</span> Pro
    </div>
    <span class="badge-count" id="headerCount">0 Items</span>
</header>

<div class="section">
    <div class="section-header open" onclick="toggleSection(this)">
        <h2><span class="dot"></span>Project Sign-Off Details</h2>
        <span class="chevron">▼</span>
    </div>
    <div class="section-body">
        <div class="form-grid">
            <div class="form-group">
                <label class="field-label">Project Reference</label>
                <input id="projRef" placeholder="e.g. PJ-2025-001">
            </div>
            <div class="form-group">
                <label class="field-label">Site / Location</label>
                <input id="siteName" placeholder="Site name">
            </div>
            <div class="form-group">
                <label class="field-label">Client</label>
                <input id="clientName" placeholder="Client name">
            </div>
            <div class="form-group">
                <label class="field-label">Engineer</label>
                <input id="engineerName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label class="field-label">Date</label>
                <input id="commDate" type="date">
            </div>
        </div>
    </div>
</div>

<div class="section">
    <div class="section-header open" onclick="toggleSection(this)">
        <h2><span class="dot" style="background:var(--accent2)"></span>Commissioning Item</h2>
        <span class="chevron">▼</span>
    </div>
    <div class="section-body">
        <div class="form-grid">
            <div class="form-group">
                <label class="field-label">Item Ref / Tag</label>
                <input id="itemRef" placeholder="e.g. AC-01">
            </div>
            <div class="form-group">
                <label class="field-label">Equipment Name</label>
                <input id="assetName" placeholder="e.g. Control Panel">
            </div>
            <div class="form-group">
                <label class="field-label">Serial Number</label>
                <input id="serialNo" placeholder="S/N">
            </div>
            <div class="form-group">
                <label class="field-label">Status</label>
                <select id="testStatus">
                    <option value="PASS">✅ Pass</option>
                    <option value="FAIL">❌ Fail</option>
                    <option value="N/A">🔘 N/A</option>
                </select>
            </div>
            <div class="form-group full">
                <label class="field-label">Comments / Defects</label>
                <textarea id="comments" placeholder="Enter observations..."></textarea>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-primary btn-full" onclick="addItem()">➕ Add Item</button>
            <button class="btn btn-secondary" onclick="copyLast()">🔁 Copy Previous</button>
        </div>
    </div>
</div>

<div class="section">
    <div class="section-header open" onclick="toggleSection(this)">
        <h2><span class="dot" style="background:var(--accent3)"></span>Asset Schedule</h2>
        <span class="chevron">▼</span>
    </div>
    <div class="section-body">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Ref</th>
                        <th>Equipment</th>
                        <th>Serial No</th>
                        <th>Status</th>
                        <th>Comments</th>
                        <th>Del</th>
                    </tr>
                </thead>
                <tbody id="itemTableBody"></tbody>
            </table>
        </div>
        <button class="btn btn-success btn-full" style="margin-top:15px;" onclick="exportToExcel()">📊 Export Report (Excel)</button>
    </div>
</div>

<div class="section">
    <div class="section-header" onclick="toggleSection(this)">
        <h2><span class="dot" style="background:var(--success)"></span>Final Client Sign-Off</h2>
        <span class="chevron">▼</span>
    </div>
    <div class="section-body collapsed">
        <div class="form-group" style="margin-bottom:15px;">
            <label class="field-label">Witnessed By (Print Name)</label>
            <input id="witnessName" placeholder="Client Name">
        </div>
        <label class="field-label">Signature</label>
        <canvas id="sig-canvas" width="600" height="150"></canvas>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-secondary" onclick="clearSig()">Clear</button>
            <button class="btn btn-primary" onclick="alert('Signature Captured')">Capture Signature</button>
        </div>
    </div>
</div>

<script>
    let items = [];
    document.getElementById('commDate').value = new Date().toISOString().split('T')[0];

    function toggleSection(header) {
        header.classList.toggle('open');
        header.nextElementSibling.classList.toggle('collapsed');
    }

    function addItem() {
        const item = {
            ref: document.getElementById('itemRef').value,
            asset: document.getElementById('assetName').value,
            sn: document.getElementById('serialNo').value,
            status: document.getElementById('testStatus').value,
            notes: document.getElementById('comments').value,
            id: Date.now()
        };
        if(!item.ref) return alert("Please enter an Item Reference");
        items.push(item);
        renderTable();
        // Reset inputs
        document.getElementById('itemRef').value = '';
        document.getElementById('serialNo').value = '';
        document.getElementById('comments').value = '';
    }

    function renderTable() {
        const body = document.getElementById('itemTableBody');
        body.innerHTML = items.map(it => `
            <tr>
                <td><b>${it.ref}</b></td>
                <td>${it.asset}</td>
                <td>${it.sn}</td>
                <td><span class="status-badge ${it.status === 'PASS' ? 'status-pass' : 'status-fail'}">${it.status}</span></td>
                <td>${it.notes}</td>
                <td><button onclick="deleteItem(${it.id})" style="color:var(--danger); background:none; border:none; cursor:pointer;">✕</button></td>
            </tr>
        `).join('');
        document.getElementById('headerCount').innerText = `${items.length} Items`;
    }

    function deleteItem(id) {
        items = items.filter(i => i.id !== id);
        renderTable();
    }

    function copyLast() {
        if(items.length === 0) return;
        const last = items[items.length - 1];
        document.getElementById('assetName').value = last.asset;
        document.getElementById('testStatus').value = last.status;
    }

    // SIGNATURE
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e.touches[0]); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); });
    canvas.addEventListener('touchend', stopDraw);

    function startDraw(e) {
        drawing = true;
        ctx.beginPath();
        const rect = canvas.getBoundingClientRect();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }
    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    function stopDraw() { drawing = false; }
    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // EXCEL EXPORT
    function exportToExcel() {
        const data = [
            ["COMMISSIONING SIGN-OFF REPORT"],
            ["Project:", document.getElementById('projRef').value],
            ["Site:", document.getElementById('siteName').value],
            ["Engineer:", document.getElementById('engineerName').value],
            [],
            ["Ref", "Equipment", "Serial No", "Status", "Comments"]
        ];
        items.forEach(i => data.push([i.ref, i.asset, i.sn, i.status, i.notes]));
        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Commissioning");
        XLSX.writeFile(wb, "Commissioning_Report.xlsx");
    }
</script>

</body>
</html>
